# Minimal Knative Serving install for the `db2st-mcp` deployment.
#
# Apply on top of the Knative operator manifest:
#   kubectl apply -f https://github.com/knative/operator/releases/download/knative-v1.14.0/operator.yaml
#   kubectl apply -f deploy/knative-serving.yaml
#
# The operator reconciles this CR into a working Serving stack: networking
# layer (Kourier by default), autoscaler, activator, controller, webhook.
---
apiVersion: v1
kind: Namespace
metadata:
  name: knative-serving
---
apiVersion: operator.knative.dev/v1beta1
kind: KnativeServing
metadata:
  name: knative-serving
  namespace: knative-serving
spec:
  version: "1.14.0"
  # Use Kourier as the ingress. Swap to "istio" or "contour" if you
  # already run one of those in the cluster.
  ingress:
    kourier:
      enabled: true
  config:
    # Magic DNS for local development on `kind`. Replace with
    # `xip.io` or a real domain for non-local clusters.
    domain:
      "127.0.0.1.sslip.io": ""
    # Match the autoscaler annotations in `deploy/func.yaml`.
    autoscaler:
      enable-scale-to-zero: "true"
      stable-window: "60s"
      panic-window-percentage: "10.0"
---
apiVersion: v1
kind: Namespace
metadata:
  name: db2st
