# Knative Functions deployment manifest.
#
# Before running `func deploy`, replace `REPLACE_ME` below with your
# container registry path. For GHCR it's typically your GitHub username
# or org. Examples:
#   registry: ghcr.io/alexismarasigan
#   image:    ghcr.io/alexismarasigan/db2st-mcp:latest
#
# `func deploy` will fail with an "invalid registry" error if you leave
# the placeholder in.
specVersion: 0.36.0
name: db2st-mcp
runtime: python
registry: ghcr.io/REPLACE_ME
image: ghcr.io/REPLACE_ME/db2st-mcp:latest
invocation:
  format: http
build:
  builder: pack
deploy:
  namespace: db2st
  annotations:
    autoscaling.knative.dev/metric: concurrency
    autoscaling.knative.dev/target: "50"
    autoscaling.knative.dev/minScale: "0"
    autoscaling.knative.dev/maxScale: "20"
  options:
    scale:
      metric: concurrency
      target: 50
      min: 0
      max: 20
envs:
  - name: LOG_LEVEL
    value: info
  - name: TOKEN_STORE
    value: upstash
  - name: UPSTASH_REDIS_REST_URL
    value: "{{ secret:upstash-creds:url }}"
  - name: UPSTASH_REDIS_REST_TOKEN
    value: "{{ secret:upstash-creds:token }}"
  # Response cache backend. Default ("memory") is per-pod and lost on
  # restart — fine for development. In a multi-pod deployment, set to
  # "upstash" so the shipment cache is shared across pods and survives
  # pod churn up to RESPONSE_CACHE_TTL_SECONDS. Reuses the same Upstash
  # credentials as the token store.
  - name: RESPONSE_CACHE_BACKEND
    value: upstash
  - name: RESPONSE_CACHE_TTL_SECONDS
    value: "60"
  # Replace with the public hostname(s) of this Knative Service. Without
  # this, the MCP transport returns HTTP 421 for any external Host
  # header (DNS-rebinding protection is on by default — see
  # docs/KNATIVE.md). Comma-separated for multiple hostnames.
  - name: MCP_ALLOWED_HOSTS
    value: db2st-mcp.db2st.example.com
