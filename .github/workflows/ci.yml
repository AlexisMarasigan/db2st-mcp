name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Locked at the workflow level: the repository default is `read` (set
# at Settings → Actions → Workflow permissions), but pinning it here
# documents the intent and survives any future default change.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Setup Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install
        run: uv sync --frozen --group dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  verify-docs:
    name: Verify docs (Clara invariants)
    runs-on: ubuntu-latest
    # `scripts/verify_docs.py` is pure stdlib (ast, re, pathlib). Skip the
    # `uv sync` step to keep this job fast on every PR.
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - name: verify-docs
        run: uv run --no-project python scripts/verify_docs.py

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --group dev
      - name: mypy
        run: uv run mypy

  test:
    name: Test (pytest, py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python }}
      - run: uv sync --frozen --group dev
      - name: Run unit tests with coverage
        run: uv run pytest tests/unit --cov-report=xml
      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  build:
    name: Build wheel
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Build sdist + wheel
        run: uv build
      - name: Validate wheel + sdist metadata (twine check)
        # Catches malformed long_description / classifiers / URLs before
        # any release workflow uploads to PyPI. Cheap and high-signal.
        run: uvx twine check --strict dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    name: Docker build (deploy/Dockerfile)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      # buildx is required for `cache-to: type=gha` — the default
      # docker driver rejects cache exports.
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          tags: db2st-mcp:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: "Smoke: container boots, /healthz returns 200, [redis] extra installed"
        run: |
          # --rm ensures cleanup on re-run / cancelled job. Trap also
          # tears down the container on any exit path of this step.
          docker run -d --rm --name db2st-ci \
            -e DB2ST_AUTH_DISABLED=1 \
            -p 18080:8080 \
            db2st-mcp:ci
          trap 'docker logs db2st-ci 2>&1 || true; docker stop db2st-ci 2>/dev/null || true' EXIT

          # Wait up to 15s for the server to come up.
          healthz_ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:18080/healthz > /tmp/healthz; then
              cat /tmp/healthz; echo
              healthz_ok=1
              break
            fi
            sleep 0.5
          done
          if [ "$healthz_ok" != "1" ]; then
            echo "container failed to come up"
            exit 1
          fi

          # Guard against iter-98's regression mode: deploy/func.yaml
          # sets TOKEN_STORE=upstash + RESPONSE_CACHE_BACKEND=upstash,
          # both of which import upstash_redis at runtime. If the
          # Dockerfile ever drops `--extra redis` again, an
          # authenticated request would fail with
          # "upstash-redis not installed". /healthz alone does not
          # exercise that path, so we assert the import directly.
          docker exec db2st-ci python -c \
            "from upstash_redis.asyncio import Redis; print('redis import ok')"
