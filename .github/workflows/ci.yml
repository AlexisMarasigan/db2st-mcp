name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Setup Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install
        run: uv sync --frozen --group dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  verify-docs:
    name: Verify docs (Clara invariants)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --group dev
      - name: verify-docs
        run: uv run python scripts/verify_docs.py

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --group dev
      - name: mypy
        run: uv run mypy

  test:
    name: Test (pytest, py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python }}
      - run: uv sync --frozen --group dev
      - name: Run unit tests with coverage
        run: uv run pytest tests/unit --cov-report=xml
      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  build:
    name: Build wheel
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Build sdist + wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    name: Docker build (deploy/Dockerfile)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          tags: db2st-mcp:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke: container boots + /healthz returns 200
        run: |
          docker run -d --name db2st-ci -e DB2ST_AUTH_DISABLED=1 -p 18080:8080 db2st-mcp:ci
          # Wait up to 15s for the server to come up.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:18080/healthz > /tmp/healthz; then
              cat /tmp/healthz; echo
              docker logs db2st-ci
              docker stop db2st-ci
              exit 0
            fi
            sleep 0.5
          done
          echo "container failed to come up"
          docker logs db2st-ci
          exit 1
