name: E2E

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"  # nightly 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    name: End-to-end suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen --group dev
      - name: Run E2E (writes docs/E2E-REPORT.md)
        run: uv run pytest tests/e2e -m e2e --report --no-cov
      - name: Upload report
        # `if: always()` ensures the report is uploaded even when the
        # pytest step fails — that's precisely the case where the
        # report is most useful for debugging.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-report
          path: docs/E2E-REPORT.md
          if-no-files-found: warn
      - name: Comment PR with E2E summary
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: docs/E2E-REPORT.md

  integration:
    name: Real-upstream integration (nightly + manual only)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # upstream rate-limiting can't break the PR pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen --group dev
      - name: Real upstream — sample refs
        run: uv run pytest tests/integration -m integration --no-cov -v
