name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist on origin."
        required: true
        type: string

permissions:
  contents: write  # to create the GitHub Release

jobs:
  build-and-release:
    name: Build wheel + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # auto-generated release notes need full history
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv python install 3.12

      - name: Verify tag matches pyproject version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          PYPROJECT_VERSION=$(uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          EXPECTED="v${PYPROJECT_VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "Tag '$TAG' does not match pyproject version '$EXPECTED'" >&2
            exit 1
          fi

      - name: Build sdist + wheel
        run: uv build

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.whl *.tar.gz > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
