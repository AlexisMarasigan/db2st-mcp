name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  bandit:
    name: bandit (static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - name: Bandit (all severities — `# nosec BXXX` annotations carry the rationale)
        # Scan production code (src/) *and* the executable scripts in scripts/
        # (verify_docs.py, sync_domain.py, example_call.py) — they're shipped
        # alongside the wheel and run with the same privileges in CI / dev.
        run: uvx bandit -r src/ scripts/ --severity-level low --confidence-level low

  pip-audit:
    name: pip-audit (deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen --group dev
      - name: Export requirements (deps only, drop editable + comments)
        # `uv export` emits the project itself as `-e .` plus comment lines
        # that `pip-audit` choke on. Strip both so we only audit external
        # dependencies (the project's own code is covered by bandit /
        # CodeQL elsewhere).
        run: |
          uv export --frozen --no-dev --format requirements-txt \
            | grep -v '^-e\|^# ' > requirements.txt
      - name: pip-audit
        uses: pypa/gh-action-pip-audit@v1.0.8
        with:
          inputs: requirements.txt

  gitleaks:
    name: gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
