version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
  # Watch `deploy/Dockerfile`'s base image (currently python:3.12-slim).
  # Auto-PR when a new patch release lands — security updates flow in
  # without manual digest bumps.
  - package-ecosystem: "docker"
    directory: "/deploy"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
