repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents, --unsafe]
        # --allow-multiple-documents: deploy/knative-serving.yaml is a
        #   multi-doc manifest (Namespace + KnativeServing + Namespace).
        # --unsafe: GitHub Actions YAML uses custom tags (`!!str`-style)
        #   plus expressions like `${{ github.ref }}` that look like
        #   YAML mapping keys at parse time. The unsafe loader does
        #   structural validation only, which is what we want here.
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # `mypy --strict` runs in CI (.github/workflows/ci.yml) where the full
  # dependency set is installed. pre-commit's isolated env can't see the
  # project's optional/test deps so a local hook would fight CI. Skipping
  # in pre-commit is the pragmatic call.

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.31.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
